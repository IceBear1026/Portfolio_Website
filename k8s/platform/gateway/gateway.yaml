apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: launchmywork-gateway
  namespace: platform-gateway
  annotations:
    alb.networking.azure.io/alb-name: launchmywork-alb
    alb.networking.azure.io/alb-namespace: platform-alb
spec:
  gatewayClassName: azure-alb-external
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      hostname: "*.launchmywork.com"
      allowedRoutes:
        namespaces:
          from: All

    - name: https
      protocol: HTTPS
      port: 443
      hostname: "*.launchmywork.com"
      tls:
        mode: Terminate
        certificateRefs:
          - name: launchmywork-wildcard-tls
      allowedRoutes:
        namespaces:
          from: All