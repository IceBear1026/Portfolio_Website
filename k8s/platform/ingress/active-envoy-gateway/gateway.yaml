apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: launchmywork-gateway
  namespace: platform-envoy-gateway
spec:
  gatewayClassName: envoy-gateway
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      hostname: "*.launchmywork.com"
      allowedRoutes:
        namespaces:
          from: All